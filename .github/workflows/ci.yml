name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            rust_scripts/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_scripts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Perl
        run: |
          sudo apt-get update
          sudo apt-get install -y perl

      - name: Run test suite
        run: bash test_motif_bridge.sh

      - name: Test installed Python entry points
        run: |
          python -m pip install -e .
          meme2homer-py -i fixtures/test.meme -j JASPAR2026 > /tmp/entry_m2h.homer
          diff -u /tmp/entry_m2h.homer fixtures/expected_meme2homer.homer
          homer2meme-py -i fixtures/test.homer > /tmp/entry_h2m.meme
          diff -u /tmp/entry_h2m.meme fixtures/expected_homer2meme.meme

  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            rust_scripts/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('rust_scripts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: rust_scripts
        run: cargo fmt --check

      - name: Run clippy
        working-directory: rust_scripts
        run: cargo clippy -- -D warnings

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff==0.9.6

      - name: Run ruff check
        run: ruff check python_scripts/

      - name: Run ruff format check
        run: ruff format --check python_scripts/

  perl-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Perl
        run: |
          sudo apt-get update
          sudo apt-get install -y perl

      - name: Syntax check
        run: perl -c perl_scripts/meme2homer.pl && perl -c perl_scripts/homer2meme.pl
